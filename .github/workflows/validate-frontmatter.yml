name: Validate Frontmatter

# Khi nào chạy: mọi PR vào main
on:
  pull_request:
    paths:
      - 'shared/content/**/*.md'
      - 'shared/adr/**/*.md'
      - 'shared/retrospectives/**/*.md'
      - '_meta/templates/**/*.md'

jobs:
  validate:
    name: Check YAML frontmatter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml jsonschema

      - name: Get changed markdown files
        id: changed-files
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD -- '*.md' | tr '\n' ' ')
          echo "files=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed files: $CHANGED"

      - name: Validate frontmatter
        if: steps.changed-files.outputs.files != ''
        run: |
          python <<'EOF'
          import os
          import sys
          import yaml
          import re
          import datetime

          # Required fields PER PATH
          REQUIRED_FIELDS = {
              'shared/content/': ['title', 'author', 'created', 'status', 'type'],
              'shared/adr/': ['id', 'title', 'date', 'deciders', 'status'],
              'shared/retrospectives/': ['period', 'date', 'author'],
          }

          # Status enums PER PATH (ADR vs content have different lifecycle)
          STATUS_ENUMS = {
              'shared/content/': ['draft', 'review', 'needs-revision', 'approved', 'rejected', 'deprecated'],
              'shared/adr/': ['Proposed', 'Active', 'Superseded', 'Reverted', 'Deprecated'],
              'shared/retrospectives/': ['draft', 'review', 'approved'],
          }

          VALID_TYPES = ['tiny', 'normal', 'high-risk']

          files = """${{ steps.changed-files.outputs.files }}""".strip().split()
          errors = []

          for file_path in files:
              if not file_path.endswith('.md') or not os.path.exists(file_path):
                  continue

              # Determine path category
              required = None
              valid_statuses = None
              for prefix, fields in REQUIRED_FIELDS.items():
                  if file_path.startswith(prefix):
                      required = fields
                      valid_statuses = STATUS_ENUMS.get(prefix, [])
                      break
              if required is None:
                  continue

              with open(file_path, 'r', encoding='utf-8') as f:
                  content = f.read()

              # Extract frontmatter
              match = re.match(r'^---\n(.*?)\n---', content, re.DOTALL)
              if not match:
                  errors.append(f"❌ {file_path}: No frontmatter found")
                  continue

              try:
                  fm = yaml.safe_load(match.group(1))
              except yaml.YAMLError as e:
                  errors.append(f"❌ {file_path}: Invalid YAML — {e}")
                  continue

              # Check required fields
              for field in required:
                  if field not in fm:
                      errors.append(f"❌ {file_path}: Missing required field `{field}`")

              # Check status enum (per path)
              if 'status' in fm and valid_statuses and fm['status'] not in valid_statuses:
                  errors.append(f"❌ {file_path}: status `{fm['status']}` not in {valid_statuses}")

              # Check type enum (only for content lane classification)
              if 'type' in fm and fm['type'] not in VALID_TYPES:
                  errors.append(f"❌ {file_path}: type `{fm['type']}` not in {VALID_TYPES}")

              # Check date format — convert datetime.date to string first
              for date_field in ['created', 'date', 'last_updated']:
                  if date_field in fm:
                      val = fm[date_field]
                      # YAML auto-parses YYYY-MM-DD into datetime.date
                      if isinstance(val, datetime.date):
                          val = val.isoformat()
                      val = str(val)
                      if not re.match(r'^\d{4}-\d{2}-\d{2}$', val):
                          errors.append(f"❌ {file_path}: {date_field} `{val}` should be YYYY-MM-DD")

              if not any(file_path in e for e in errors):
                  print(f"✅ {file_path}: frontmatter OK")

          if errors:
              print("\n=== FRONTMATTER VALIDATION FAILED ===")
              for e in errors:
                  print(e)
              sys.exit(1)
          else:
              print("\n✅ All frontmatter valid!")
          EOF
