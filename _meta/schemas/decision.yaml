# Schema for Decision Record and ADR
# Used by .github/workflows/validate-schemas.yml

$schema: "https://json-schema.org/draft-07/schema#"
title: "Decision Record"
type: object

required:
  - id
  - title
  - date
  - deciders
  - status

properties:
  id:
    type: string
    pattern: "^(D|ADR)-[0-9]{3}$"

  title:
    type: string
    minLength: 10
    maxLength: 100

  date:
    type: string
    pattern: "^\\d{4}-\\d{2}-\\d{2}$"

  deciders:
    type: array
    items:
      type: string
    minItems: 1

  status:
    type: string
    enum: [Proposed, Active, Superseded, Reverted, Deprecated]

  supersedes:
    type: string
    pattern: "^(D|ADR)-[0-9]{3}$|^$"

  superseded_by:
    type: string
    pattern: "^(D|ADR)-[0-9]{3}$|^$"

  tags:
    type: array
    items:
      type: string

  revisit_after:
    type: string
    description: "e.g. '3 months', '6 months'"

  related_pr:
    type: integer
    minimum: 1
    description: "GitHub PR number"

  # Optional fields for cross-compat with content.yaml + pr-check.sh
  author:
    type: string
    description: "GitHub username (for compat with pr-check.sh)"

  created:
    type: string
    pattern: "^\\d{4}-\\d{2}-\\d{2}$"
    description: "Same as 'date', for compat with pr-check.sh"

  type:
    type: string
    enum: [tiny, normal, high-risk]
    description: "Lane type (for compat with pr-check.sh)"

additionalProperties: false
