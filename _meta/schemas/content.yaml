# Schema for shared/content/*.md frontmatter
# Used by .github/workflows/validate-schemas.yml

$schema: "https://json-schema.org/draft-07/schema#"
title: "Content Frontmatter"
type: object

required:
  - title
  - author
  - created
  - status
  - type

properties:
  title:
    type: string
    minLength: 5
    maxLength: 100

  author:
    type: string
    description: "GitHub username (lowercase, no spaces)"
    pattern: "^[a-zA-Z0-9][a-zA-Z0-9-]*$"

  created:
    type: string
    pattern: "^\\d{4}-\\d{2}-\\d{2}$"
    description: "YYYY-MM-DD format"

  last_updated:
    type: string
    pattern: "^\\d{4}-\\d{2}-\\d{2}$"

  status:
    type: string
    enum: [draft, review, needs-revision, approved, rejected, deprecated]

  type:
    type: string
    enum: [tiny, normal, high-risk]

  tags:
    type: array
    items:
      type: string
      pattern: "^[a-z][a-z0-9-]*$"
    maxItems: 10
    uniqueItems: true

  related_decisions:
    type: array
    items:
      type: string
      pattern: "^D-[0-9]{3}$"

  related_adrs:
    type: array
    items:
      type: string
      pattern: "^ADR-[0-9]{3}$"

  validation:
    type: object
    properties:
      status:
        type: string
        enum: [validated, partial, unvalidated]
      validated_by:
        type: string
      validated_at:
        type: string
        pattern: "^\\d{4}-\\d{2}-\\d{2}$"

additionalProperties: false
