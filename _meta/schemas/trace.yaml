# Schema for .work/traces/*.md frontmatter
# Note: trace files are LOCAL only (gitignored), but format should be consistent
# so /retro command can parse them across the team during sync.

$schema: "https://json-schema.org/draft-07/schema#"
title: "Trace Log"
type: object

required:
  - date
  - user
  - branch
  - lane
  - outcome

properties:
  date:
    type: string
    pattern: "^\\d{4}-\\d{2}-\\d{2}$"

  user:
    type: string
    pattern: "^@[a-zA-Z0-9][a-zA-Z0-9-]*$"
    description: "GitHub username with @ prefix"

  branch:
    type: string
    pattern: "^(tiny|normal|high-risk|docs|chore|experiment)/[a-z0-9][a-z0-9-]*$"

  lane:
    type: string
    enum: [tiny, normal, high-risk]

  outcome:
    type: string
    enum: [success, partial, blocked, abandoned]

  duration_min:
    type: integer
    minimum: 0

  commits:
    type: integer
    minimum: 0

  files_changed:
    type: integer
    minimum: 0

  pr_number:
    type: integer
    minimum: 1
    description: "GitHub PR number if exists"

  friction_count:
    type: integer
    minimum: 0
    description: "Number of friction items reported"

  related_decisions:
    type: array
    items:
      type: string
      pattern: "^D-[0-9]{3}$|^ADR-[0-9]{3}$"

additionalProperties: false
